 <!DOCTYPE html>
<html lang="en" >
 <head>
    <meta charset="UTF-8">

    <div class="heart red" style="top: 19%; right: 35%;">💋</div>
    <div class="heart yellow" style="bottom: 33%; left: 80%;">💕</div>

    <div class="heart yellow" style="bottom: 44%; left: 10%;">😍</div>
    <div class="heart red" style="top: 24%; right: 56%;">❤️</div>
    <div class="heart yellow" style="bottom: 90%; left: 20%;">💕</div>
    <div class="heart red" style="top: 85%; right: 60%;">💗</div>
    <div class="heart yellow" style="bottom: 5%; left: 20%;">💕</div>


</section>
<section id="screen-game" class="hidden">
    <div class="prank-wrap">
        <div class="image">
            <img src="Please.jpg" alt="Cool Sticker">
        </div>
        <h1 class="big-question">Are u excited to see it???!!!</h1>
        
        <div class="button-area">
            <button id="btn-yes-game" class="green-btn">Yesss</button>
            <button id="btn-no-game" class="red-btn">Noooo</button>
        </div>
    </div>

    <div id="game-box" class="hidden">
       <h2>But before you see it, you have to play a little game! 🧸</h2>
          <div class="stats">
              Moves: <span id="move-counter">0</span>
           </div>
    <div id="memory-grid" class="grid-4x4">
        </div>
    <h2 id="win-message" class="hidden">youuu wonnn now itss timeeee click anywhere to see it 🫶</h2>
</section>
<section id="screen-diva" class="hidden">
    <div class="corner-greeting">Hy Divaaa! ✨</div>
    <div class="window-container">
        <div class="typing-window">
            <div id="typing-window-content"></div>
        </div>
    </div>
</section>
<script src="script.js"></script>
</body>
</htm>
